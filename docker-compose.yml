version: '3.9'

services:

  # ─── Jenkins ────────────────────────────────────────────────────────────────
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      # Persist Jenkins data
      - jenkins_home:/var/jenkins_home
      # Mount host Docker socket so Jenkins can run docker commands
      - /var/run/docker.sock:/var/run/docker.sock
    user: root

  # ─── Next.js App ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news-container
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    depends_on:
      - mongo

  # ─── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:6
    container_name: news-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  jenkins_home:
  mongo_data:
