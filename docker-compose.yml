version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news-container
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    container_name: news-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
